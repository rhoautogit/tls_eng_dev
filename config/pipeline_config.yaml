# TLS Engineering PDF Pipeline Configuration
# All thresholds, modes, and preprocessing settings are tunable here without code changes.

# ─── Accuracy & Retry ────────────────────────────────────────────────────────
accuracy_threshold: 0.95          # 95% minimum coverage to pass
max_retries: 3                    # Maximum retry attempts per page
early_termination_threshold: 0.01 # Stop retries if delta < 1% for 2 consecutive attempts

# ─── Output Directories ──────────────────────────────────────────────────────
output:
  base_dir: "output"
  reports_dir: "reports"

# ─── Layer 1: Extraction Settings ────────────────────────────────────────────
extraction:
  pdfplumber:
    default_mode: "lattice"       # lattice (line-based) or stream (whitespace-based)
    lattice:
      snap_tolerance: 3.0
      join_tolerance: 3.0
      edge_min_length: 3.0
    stream:
      snap_tolerance: 3.0
      join_tolerance: 3.0
      edge_min_length: 3.0
      min_words_vertical: 1
      min_words_horizontal: 1
    word_x_tolerance: 3
    word_y_tolerance: 3
    text_block_line_gap: 5.0      # max vertical gap (pts) to merge words into a line
    text_block_block_gap: 15.0   # max vertical gap (pts) to merge lines into a block

  opencv:
    dpi: 200                      # render DPI for image-based extraction
    adaptive_threshold:
      block_size: 11              # must be odd
      constant: 2
    morphological:
      kernel_h: [30, 1]           # horizontal line detection kernel [width, height]
      kernel_v: [1, 30]           # vertical line detection kernel
      iterations: 1
    min_cell_area: 50             # minimum pixel area to count as a cell
    min_table_cells: 2            # minimum cells to count as a table
    table_cluster_gap_pct: 0.05   # max gap between cells in same table (fraction of width)

  merger:
    digital_threshold: 100        # chars from pdfplumber to consider page "digital"
    scanned_threshold: 20         # chars below which page is considered "scanned"
    digital_pdfplumber_weight: 0.7
    digital_opencv_weight: 0.3
    scanned_pdfplumber_weight: 0.3
    scanned_opencv_weight: 0.7
    table_iou_threshold: 0.4      # IoU above this = same table, pick higher confidence
    text_iou_threshold: 0.5

  custom_table:
    min_cluster_size: 4           # min text blocks to form an implicit table
    grid_alignment_tolerance: 10  # pts tolerance for considering items "aligned"

# ─── Page Classification (Stage 1) ──────────────────────────────────────────
page_classification:
  digital_char_threshold: 100     # min embedded chars to consider page digital
  scanned_char_threshold: 20      # below this = scanned (between = hybrid check)
  image_coverage_threshold: 0.4   # image area > 40% of page triggers hybrid/scanned
  min_image_size: 50              # ignore images smaller than 50px in either dimension

# ─── Scanned Path Settings (PaddleOCR) ──────────────────────────────────────
scanned_path:
  paddleocr:
    use_gpu: true                 # GPU enabled (paddlepaddle-gpu 2.6.1 + CUDA 12 + cuDNN 8)
    lang: "en"                    # PaddleOCR language code
    use_angle_cls: true           # detect text rotation
    show_log: false               # suppress PaddleOCR internal logs
    det_model_dir: null           # custom detection model path (null = default)
    rec_model_dir: null           # custom recognition model path (null = default)
    table_model_dir: null         # custom table model path (null = default)
  ocr:
    dpi: 300                      # render DPI for PaddleOCR
  preprocessing:
    deskew: true
    denoise: true
    binarize: true
    clahe:
      clip_limit: 2.0
      tile_grid_size: [8, 8]
  confidence_gate:
    high_threshold: 0.95          # above = HIGH confidence, no review needed
    medium_threshold: 0.85        # above = MEDIUM, Qwen-VL review
    low_threshold: 0.0            # below medium = LOW, Qwen-VL + human review
  qwen_vl:
    enabled: true
    model: "qwen3-vl:8b"          # Ollama model name
    ollama_host: "http://localhost:11434"
    gpu_num_ctx: -1               # -1 for GPU mode (auto)
    cpu_num_ctx: 0                # 0 for CPU mode
    timeout: 300                  # per-page timeout in seconds (300s to allow cold-start)
  retry:
    max_retries: 3                # max OCR retry attempts per page
    early_termination_threshold: 0.01  # stop if confidence delta < 1% for 2 consecutive
    strategies:
      retry_1:
        description: "Higher DPI + CLAHE contrast enhancement"
        dpi: 400
        clahe:
          clip_limit: 3.0
          tile_grid_size: [8, 8]
        deskew: true
        denoise: true
        line_removal: true
      retry_2:
        description: "Max DPI + aggressive CLAHE + adaptive binarization"
        dpi: 450
        clahe:
          clip_limit: 4.0
          tile_grid_size: [4, 4]
        deskew: true
        denoise: true
        line_removal: true
        adaptive_binarize: true
        adaptive_block_size: 15
        adaptive_constant: 5
      retry_3:
        description: "Full combined -- max DPI, max CLAHE, morphological cleanup"
        dpi: 600
        clahe:
          clip_limit: 5.0
          tile_grid_size: [4, 4]
        deskew: true
        denoise: true
        line_removal: true
        adaptive_binarize: true
        adaptive_block_size: 11
        adaptive_constant: 3
        morphological_open: true
        morphological_kernel: [2, 2]

# ─── Validation Engine (Stage 3) ────────────────────────────────────────────
validation:
  pass_threshold: 0.95            # composite score >= 95% to pass
  weights:
    coverage: 0.30                # V1: spatial coverage
    accuracy: 0.25                # V2: text correctness
    completeness: 0.15            # V3: missing content inventory
    structural: 0.15              # V4: document structure integrity
    cross_validation: 0.15        # V5: cross-source agreement
  flagging:
    accuracy_warning: 0.90        # flag if accuracy below 90%
    accuracy_critical: 0.85       # high severity if below 85%
    completeness_warning: 0.90    # flag if completeness below 90%
    completeness_critical: 0.80   # high severity if below 80%
    structural_warning: 0.90      # flag if structural below 90%

# ─── Layer 2: Coverage Scoring ───────────────────────────────────────────────
coverage:
  header_margin_pct: 0.08         # top 8% of page excluded from baseline
  footer_margin_pct: 0.08         # bottom 8% of page excluded from baseline
  min_text_length: 3              # strings shorter than this are excluded (e.g. page numbers)
  page_number_patterns:
    - "^\\d+$"
    - "^- \\d+ -$"
    - "^page \\d+$"
    - "^\\d+ of \\d+$"

# ─── Layer 3: Visual Validation ──────────────────────────────────────────────
visual:
  render_dpi: 150
  content_threshold: 240          # grayscale threshold; below = content pixel
  content_dilate_kernel: 5        # kernel size for dilating content mask
  content_dilate_iterations: 2
  min_gap_area_ratio: 0.005       # gaps smaller than 0.5% of page are ignored
  gap_severity:
    low_max: 0.02                 # < 2% of page area
    medium_max: 0.05              # 2–5% of page area
                                  # >= 5% = high

# ─── Retry Strategies ────────────────────────────────────────────────────────
retry_strategies:
  retry_1:
    description: "Switch pdfplumber mode, loosen thresholds, target gap region"
    switch_pdfplumber_mode: true
    tolerance_multiplier: 1.5     # loosen snap/join tolerances by this factor
    target_gap_region: true

  retry_2:
    description: "Enhanced OpenCV preprocessing, text-alignment pdfplumber, target gap"
    clahe:
      clip_limit: 2.0
      tile_grid_size: [8, 8]
    sharpening: true
    noise_reduction: true
    text_alignment_detection: true
    target_gap_region: true

  retry_3:
    description: "Full combined reprocessing, maximum sensitivity"
    combine_all: true
    pdfplumber_snap_tolerance: 10.0
    pdfplumber_join_tolerance: 10.0
    pdfplumber_edge_min_length: 1.0
    opencv_dpi: 300
    clahe:
      clip_limit: 3.0
      tile_grid_size: [4, 4]
    sharpening: true
    noise_reduction: true
    text_alignment_detection: true

# ─── Reporting ───────────────────────────────────────────────────────────────
reporting:
  formats:
    - json
    - html
    - csv
  embed_images_in_html: true      # base64-encode gap maps into HTML
  confidence_levels:
    high: 0.8
    medium: 0.5
                                  # below 0.5 = low
